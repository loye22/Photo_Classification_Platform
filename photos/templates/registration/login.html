{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 0 auto;">
    <h2>Login</h2>
    <p style="color: #666; margin-bottom: 25px;">Sign in to your account to continue.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top: 10px;">
            <button class="btn" type="submit" style="width: 100%;">Sign In</button>
        </div>
    </form>
    
    <div style="margin-top: 20px; text-align: center; border-top: 1px solid #eee; padding-top: 15px; font-size: 0.95rem;">
        Don't have an account? <a href="{% url 'register' %}" style="font-weight: 500;">Register</a>
    </div>
</div>
{% endblock %}
