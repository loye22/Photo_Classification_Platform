{% extends "base.html" %}
{% block content %}
<h2>Upload Photo</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <label>Name:</label><input type="text" name="name" required>
    <label>Age:</label><input type="number" name="age" required>
    <label>Gender:</label>
    <select name="gender" required>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
    </select>
    <label>Place of living:</label><input type="text" name="place_of_living" required>
    <label>Country of origin:</label><input type="text" name="country_of_origin" required>
    <label>Description:</label><textarea name="description" rows="4"></textarea>
    <label>Photo:</label><input type="file" name="photo_file" required>
    <button type="submit">Submit</button>
</form>
{% endblock %}
