<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}Photo Classification{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        nav {
            background: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .flash {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .flash.success {
            background: #d4edda;
            color: #155724;
        }

        .flash.error {
            background: #f8d7da;
            color: #721c24;
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: #0056b3;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        label {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav>
        <div>
            <a href="{% url 'home' %}">🏠 Home</a>
            {% if user.is_authenticated %}
            <a href="{% url 'submit' %}">📤 Upload</a>
            <a href="/admin/">🔧 Admin</a>
            {% endif %}
        </div>
        <div>
            {% if user.is_authenticated %}
            <span>👋 {{ user.email }}</span>

            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background: none; border: none; color: white; text-decoration: underline; cursor: pointer;">Logout</button>
            </form>

            {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
        {% for message in messages %}
        <div class="flash {{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
</body>

</html>
